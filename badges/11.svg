<circle cx="89" cy="79" r="2.4499999999999997" fill="#fff" opacity="0.8"/>
<circle cx="107" cy="79" r="2.4499999999999997" fill="#fff" opacity="0.8"/>
<circle cx="93.5" cy="83.5" r="1.2249999999999999" fill="#fff" opacity="0.5"/>
<circle cx="111.5" cy="83.5" r="1.2249999999999999" fill="#fff" opacity="0.5"/>
<path d="M84,68.9 Q91,66.9 98,68.9" fill="none" stroke="#FF4500" stroke-width="1.2" stroke-linecap="round"/>
<path d="M102,68.9 Q109,66.9 116,68.9" fill="none" stroke="#FF4500" stroke-width="1.2" stroke-linecap="round"/>
<path d="M96,93.1 Q100,96.1 104,93.1" fill="none" stroke="#B87060" stroke-width="0.8" stroke-linecap="round"/>
<ellipse cx="89" cy="92.1" rx="3" ry="1.5" fill="#F0A0A0" opacity="0.3"/>
<ellipse cx="111" cy="92.1" rx="3" ry="1.5" fill="#F0A0A0" opacity="0.3"/>

<!-- CGC Badge on chest -->

<g transform="translate(100,125)">
  <defs>
    <radialGradient id="cg100_125" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
  </defs>
  <circle cx="0" cy="0" r="11" fill="#b45309" filter="url(#sh)"/>
  <circle cx="0" cy="0" r="9" fill="url(#cg100_125)"/>
  <circle cx="0" cy="0" r="6.4799999999999995" fill="none" stroke="rgba(120,53,15,0.4)" stroke-width="0.5"/>
  <text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="8" fill="#fff">G</text>
  <text x="0" y="7" text-anchor="middle" dominant-baseline="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="2" fill="rgba(255,255,255,0.8)" letter-spacing="1">CGC</text>
  <ellipse cx="-2" cy="-3" rx="3" ry="2" transform="rotate(-20)" fill="rgba(255,255,255,0.2)"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<defs>
  <radialGradient id="ring11" cx="50%" cy="50%" r="50%">
    <stop offset="85%" stop-color="#CD7F32"/>
    <stop offset="95%" stop-color="#8B6B4A"/>
    <stop offset="100%" stop-color="#8B6B4A" stop-opacity="0.8"/>
  </radialGradient>
  <radialGradient id="bg11" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#2A1520"/>
    <stop offset="100%" stop-color="#0A0E18"/>
  </radialGradient>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  
  <radialGradient id="actBg11" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#3A0A0A"/><stop offset="60%" stop-color="#1E0A0A"/><stop offset="100%" stop-color="#0A0505"/>
  </radialGradient>
</defs>

<!-- Background circle -->
<circle cx="100" cy="100" r="96" fill="url(#actBg11)" stroke="url(#ring11)" stroke-width="6" filter="url(#sh)"/>

<!-- Tier accent ring -->
<circle cx="100" cy="100" r="88" fill="none" stroke="#CD7F32" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>

<!-- Background element -->
<circle cx="95" cy="55" r="2" fill="#CD7F32" opacity="0.1"/><circle cx="105" cy="50" r="1.5" fill="#CD7F32" opacity="0.08"/><circle cx="98" cy="48" r="1" fill="#CD7F32" opacity="0.06"/>

<!-- Upper body -->
<path d="M73,98 Q68,112 76,132 L124,132 Q132,112 127,98 Q115,103 100,105 Q85,103 73,98Z" fill="#1A1A2E" opacity="0.35"/>

<!-- Neck -->
<rect x="96" y="96" width="8" height="8" rx="2" fill="#FDE8D0"/>


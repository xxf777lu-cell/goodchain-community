<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<defs>
  <radialGradient id="ring18" cx="50%" cy="50%" r="50%">
    <stop offset="85%" stop-color="#E0E8F0"/>
    <stop offset="95%" stop-color="#7B8B9B"/>
    <stop offset="100%" stop-color="#7B8B9B" stop-opacity="0.8"/>
  </radialGradient>
  <radialGradient id="bg18" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#1A2030"/>
    <stop offset="100%" stop-color="#0A0E18"/>
  </radialGradient>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  
  
</defs>

<!-- Background circle -->
<circle cx="100" cy="100" r="96" fill="url(#bg18)" stroke="url(#ring18)" stroke-width="6" filter="url(#sh)"/>

<!-- Tier accent ring -->
<circle cx="100" cy="100" r="88" fill="none" stroke="#E0E8F0" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>


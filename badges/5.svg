<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Hexagon base -->
  <polygon points="176.2102355330306,56.00000000000001 176.2102355330306,144 100,188 23.789764466969388,144 23.7897644669694,55.99999999999999 99.99999999999999,12" fill="url(#g)" stroke="#FF4500" stroke-width="3" filter="url(#shadow)"/>
  <!-- Inner highlight -->
  <polygon points="176.2102355330306,56.00000000000001 176.2102355330306,144 100,188 23.789764466969388,144 23.7897644669694,55.99999999999999 99.99999999999999,12" fill="url(#inner)"/>
  <!-- Icon circle -->
  <circle cx="100" cy="88" r="34" fill="#fff" opacity="0.3" stroke="#fff" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Icon text -->
  <text x="100" y="94" text-anchor="middle" font-size="36" fill="#fff" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.4))">👑</text>
  <!-- Badge name -->
  <text x="100" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="Arial, sans-serif" filter="drop-shadow(0 1px 1px rgba(0,0,0,0.5))">Eternal Knight</text>
  <!-- Tier label -->
  <text x="100" y="160" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8" font-family="Arial, sans-serif">Legendary Tier</text>

<!-- Name label background -->
<rect x="30" y="155" width="140" height="22" rx="11" fill="rgba(0,0,0,0.4)" stroke="#FFD700" stroke-width="0.5"/>

<!-- Badge Name -->
<text x="100" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFD700" font-family="Arial,sans-serif" letter-spacing="2">AETERNUS</text>

<!-- Description at bottom -->
<text x="100" y="186" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif">Half a year's watch. The sentinel who never leaves their post.</text>

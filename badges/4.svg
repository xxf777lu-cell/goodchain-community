<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<defs>
  <radialGradient id="ring4" cx="50%" cy="50%" r="50%">
    <stop offset="85%" stop-color="#FFD700"/>
    <stop offset="95%" stop-color="#B8860B"/>
    <stop offset="100%" stop-color="#B8860B" stop-opacity="0.8"/>
  </radialGradient>
  <radialGradient id="bg4" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#1A2030"/>
    <stop offset="100%" stop-color="#0A0E18"/>
  </radialGradient>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  
  
</defs>

<!-- Background circle -->
<circle cx="100" cy="100" r="96" fill="url(#bg4)" stroke="url(#ring4)" stroke-width="6" filter="url(#sh)"/>

<!-- Tier accent ring -->
<circle cx="100" cy="100" r="88" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>

<!-- Background element -->
<rect x="93" y="52" width="14" height="24" rx="2" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.1"/>

<!-- Upper body -->
<path d="M68,96 Q65,115 70,135 L130,135 Q135,115 132,96 Q115,102 100,104 Q85,102 68,96Z" fill="#C0C0C0" opacity="0.2"/><path d="M72,98 Q68,120 75,135 L125,135 Q132,120 128,98Z" fill="#C0C0C0" opacity="0.1"/>

<!-- Neck -->
<rect x="96" y="96" width="8" height="8" rx="2" fill="#FDE8D0"/>


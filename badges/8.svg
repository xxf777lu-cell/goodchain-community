<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<defs>
  <radialGradient id="ring8" cx="50%" cy="50%" r="50%">
    <stop offset="85%" stop-color="#FFD700"/>
    <stop offset="95%" stop-color="#B8860B"/>
    <stop offset="100%" stop-color="#B8860B" stop-opacity="0.8"/>
  </radialGradient>
  <radialGradient id="bg8" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#2A1520"/>
    <stop offset="100%" stop-color="#0A0E18"/>
  </radialGradient>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="gdcBg8" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1A0A30"/><stop offset="50%" stop-color="#0E1420"/><stop offset="100%" stop-color="#0A0E1A"/>
  </linearGradient>
  
</defs>

<!-- Background circle -->
<circle cx="100" cy="100" r="96" fill="url(#gdcBg8)" stroke="url(#ring8)" stroke-width="6" filter="url(#sh)"/>

<!-- Tier accent ring -->
<circle cx="100" cy="100" r="88" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>

<!-- Background element -->
<line x1="100" y1="50" x2="100" y2="80" stroke="#FFD700" stroke-width="1" opacity="0.08"/><line x1="95" y1="75" x2="105" y2="75" stroke="#FFD700" stroke-width="0.5" opacity="0.08"/>

<!-- Upper body -->
<path d="M74,98 Q72,108 78,130 L122,130 Q128,108 126,98 Q115,103 100,105 Q85,103 74,98Z" fill="#2D3748" opacity="0.3"/><line x1="85" y1="110" x2="115" y2="110" stroke="#4A5568" stroke-width="0.5" opacity="0.15"/>

<!-- Neck -->
<rect x="96" y="96" width="8" height="8" rx="2" fill="#FDE8D0"/>

<!-- Anime Face -->
<ellipse cx="100" cy="78" rx="22" ry="24" fill="#FDE8D0" stroke="#E8C9A8" stroke-width="0.5"/>
<path d="M78,74 L74,60 L80,58 L82,52 L88,54 L92,48 L97,52 L102,48 L107,52 L112,50 L116,56 L122,58 L124,64 L122,74 Q120,81 100,81 Q80,81 78,74Z" fill="#8B0000"/>
<ellipse cx="91" cy="81" rx="7" ry="9.1" fill="#fff"/>
<ellipse cx="109" cy="81" rx="7" ry="9.1" fill="#fff"/>
<ellipse cx="91" cy="82" rx="4.8999999999999995" ry="5.915" fill="#2C1810"/>
<ellipse cx="109" cy="82" rx="4.8999999999999995" ry="5.915" fill="#2C1810"/>
<ellipse cx="91" cy="82" rx="2.4499999999999997" ry="3.1849999999999996" fill="#000"/>
<ellipse cx="109" cy="82" rx="2.4499999999999997" ry="3.1849999999999996" fill="#000"/>
<circle cx="89" cy="79" r="2.4499999999999997" fill="#fff" opacity="0.8"/>
<circle cx="107" cy="79" r="2.4499999999999997" fill="#fff" opacity="0.8"/>
<circle cx="93.5" cy="83.5" r="1.2249999999999999" fill="#fff" opacity="0.5"/>
<circle cx="111.5" cy="83.5" r="1.2249999999999999" fill="#fff" opacity="0.5"/>
<path d="M84,68.9 Q91,66.9 98,68.9" fill="none" stroke="#8B0000" stroke-width="1.2" stroke-linecap="round"/>
<path d="M102,68.9 Q109,66.9 116,68.9" fill="none" stroke="#8B0000" stroke-width="1.2" stroke-linecap="round"/>
<path d="M96,93.1 Q100,96.1 104,93.1" fill="none" stroke="#B87060" stroke-width="0.8" stroke-linecap="round"/>
<ellipse cx="89" cy="92.1" rx="3" ry="1.5" fill="#F0A0A0" opacity="0.3"/>
<ellipse cx="111" cy="92.1" rx="3" ry="1.5" fill="#F0A0A0" opacity="0.3"/>

<!-- CGC Badge on chest -->

<g transform="translate(100,125)">
  <defs>
    <radialGradient id="cg100_125" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
  </defs>
  <circle cx="0" cy="0" r="11" fill="#b45309" filter="url(#sh)"/>
  <circle cx="0" cy="0" r="9" fill="url(#cg100_125)"/>
  <circle cx="0" cy="0" r="6.4799999999999995" fill="none" stroke="rgba(120,53,15,0.4)" stroke-width="0.5"/>
  <text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="8" fill="#fff">G</text>
  <text x="0" y="7" text-anchor="middle" dominant-baseline="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="2" fill="rgba(255,255,255,0.8)" letter-spacing="1">CGC</text>
  <ellipse cx="-2" cy="-3" rx="3" ry="2" transform="rotate(-20)" fill="rgba(255,255,255,0.2)"/>
</g>

<!-- Name label background -->
<rect x="30" y="155" width="140" height="22" rx="11" fill="rgba(0,0,0,0.4)" stroke="#FFD700" stroke-width="0.5"/>

<!-- Badge Name -->
<text x="100" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFD700" font-family="Arial,sans-serif" letter-spacing="2">PRAETOR</text>

<!-- Description at bottom -->
<text x="100" y="186" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif">2,000 GDC. Steward of the growing republic.</text>
</svg>